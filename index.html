<!DOCTYPE html>
<!--
  Native patch instructions for Android TV / Fire TV:

  1. AndroidManifest.xml — add `android:isGame="true"` or `android:isTV="true"`
     to the `<application>` tag so the app shows up in the TV Play Store.
  2. AndroidManifest.xml — add LEANBACK launcher intent filter:
     <category android:name="android.intent.category.LEANBACK_LAUNCHER"/>
  3. MainActivity.java — override onBackPressed() to dispatch to
     Capacitor's back-button listener and handle double-press exit
     (see Capacitor's `App.addListener('backButton', ...)`).
  4. res/xml/file_paths.xml — ensure storage permissions for HLS caching.
  5. If using ExoPlayer, set `com.google.android.exoplayer2` in build.gradle.
-->
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0B0B09">
  <title>WebPhim</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  <link rel="preconnect" href="https://phimimg.com">
  <link rel="dns-prefetch" href="https://phimimg.com">
  <link rel="stylesheet" href="/src/style.css">
  <style>.sw-toast{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#000;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;cursor:pointer;opacity:0;transform:translateY(20px);transition:opacity .3s,transform .3s}.sw-toast.show{opacity:1;transform:translateY(0)}</style>
</head>
<body>
  <a href="#app" class="skip-link">Bỏ qua điều hướng</a>
  <div id="sr-announcer" aria-live="polite" class="sr-only"></div>
  <div id="app"></div>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      const t = document.createElement('div')
      t.className = 'sw-toast'
      t.textContent = '✓ Đã cập nhật'
      document.body.appendChild(t)
      requestAnimationFrame(() => t.classList.add('show'))
      setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300) }, 3000)
    })
  }
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
