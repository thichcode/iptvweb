name: Release APK
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Custom tag (e.g. v1.0.0). Default: auto'
        required: false
permissions: { contents: write }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run build
      - name: Debug info
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          ls -la node_modules/.bin/cap node_modules/.bin/capacitor 2>/dev/null || echo "cap not found in .bin"
          node -e "try{require.resolve('@capacitor/cli');console.log('CLI found')}catch(e){console.log('CLI NOT found:'+e.message)}"
      - name: Add Android platform
        run: node node_modules/.bin/cap add android
      - name: Sync web to Android
        run: node node_modules/.bin/cap sync android
      - name: Install custom app icon
        run: |
          ICON="assets/app-icon.png"
          node scripts/make-banner.cjs
          if [ -f "$ICON" ]; then
            for D in android/app/src/main/res/mipmap-*dpi; do
              [ -d "$D" ] || continue
              cp "$ICON" "$D/ic_launcher.png"
              cp "$ICON" "$D/ic_launcher_round.png"
              cp "$ICON" "$D/ic_launcher_foreground.png"
            done
            mkdir -p android/app/src/main/res/drawable
            cp assets/banner.png android/app/src/main/res/drawable/banner.png
          fi
      - name: Patch AndroidManifest for TV
        run: |
          M="android/app/src/main/AndroidManifest.xml"
          if [ -f "$M" ]; then
            sed -i 's|</manifest>|  <uses-feature android:name="android.software.leanback" android:required="false" />\n  <uses-feature android:name="android.hardware.touchscreen" android:required="false" />\n</manifest>|' "$M"
            # ponytail: attribute is on its own line in Capacitor manifest, so match the attribute not the tag
            sed -i 's|android:name=".MainActivity"|android:name=".MainActivity" android:banner="@drawable/banner" android:screenOrientation="landscape"|' "$M"
          fi
      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon
      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk WebPhim.apk
      - name: Set tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.version }}"
          if [ -z "$TAG" ]; then TAG="build-${{ github.run_number }}"; fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: WebPhim.apk
          generate_release_notes: true
          make_latest: true
