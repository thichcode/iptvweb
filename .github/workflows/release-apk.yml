name: Release APK
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Custom tag (e.g. v1.0.0). Default: auto'
        required: false
permissions: { contents: write }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '21' }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run build
      - name: Add Android platform
        run: node node_modules/.bin/cap add android
      - name: Sync web to Android
        run: node node_modules/.bin/cap sync android
      - name: Copy app icon
        run: |
          cp assets/app-icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp assets/app-icon.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp assets/app-icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp assets/app-icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp assets/app-icon.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          # Also copy as foreground for adaptive icons
          cp assets/app-icon.png android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png
          cp assets/app-icon.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png
          cp assets/app-icon.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png
      - name: Fix adaptive icon (use PNG foreground)
        run: rm -f android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_foreground.xml
      - name: Copy TV banner
        run: |
          for dir in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            cp assets/tv_banner.png android/app/src/main/res/$dir/tv_banner.png
          done
      - name: Patch for Android TV
        run: |
          M="android/app/src/main/AndroidManifest.xml"
          # TV features
          sed -i 's|</manifest>|  <uses-feature android:name="android.hardware.touchscreen" android:required="false" />\n  <uses-feature android:name="android.software.leanback" android:required="false" />\n  <uses-feature android:name="android.hardware.screen.landscape" android:required="false" />\n</manifest>|' "$M"
          # Banner
          sed -i 's|android:supportsRtl="true"|android:supportsRtl="true"\n        android:banner="@drawable/tv_banner"|' "$M"
          # Resizeable + LEANBACK_LAUNCHER
          sed -i 's|android:exported="true"|android:exported="true"\n            android:resizeableActivity="true"|' "$M"
          sed -i 's|<category android:name="android.intent.category.LAUNCHER" />|<category android:name="android.intent.category.LAUNCHER" />\n                <category android:name="android.intent.category.LEANBACK_LAUNCHER" />|' "$M"
          # TV banner drawable
          mkdir -p android/app/src/main/res/drawable
          printf '<?xml version="1.0" encoding="utf-8"?><bitmap xmlns:android="http://schemas.android.com/apk/res/android" android:src="@mipmap/tv_banner" android:gravity="center" />' > android/app/src/main/res/drawable/tv_banner.xml
      - name: Patch build.gradle with signing config
        run: |
          sed -i '/^android {/a\    signingConfigs {\n        debug {\n            storeFile file("../../certs/debug.keystore")\n            storePassword "android"\n            keyAlias "androiddebugkey"\n            keyPassword "android"\n        }\n    }' android/app/build.gradle
          sed -i '/buildTypes {/a\        debug {\n            signingConfig signingConfigs.debug\n        }' android/app/build.gradle
      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon
      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk WebPhim.apk
      - name: Set tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.version }}"
          if [ -z "$TAG" ]; then TAG="build-${{ github.run_number }}"; fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: WebPhim.apk
          generate_release_notes: true
          make_latest: true
